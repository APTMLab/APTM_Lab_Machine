<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Measurement WorkFlow Remote</title>
  <meta name="description" content="Remote scan setup and run control for Measurement WorkFlow." />
  <style>
    :root {
      color-scheme: light;
      --bg:#edf4f9;
      --panel:#ffffff;
      --panel2:#f8fbff;
      --ink:#0f172a;
      --muted:#64748b;
      --line:#cbd5e1;
      --line2:#dbe5ef;
      --teal:#0f766e;
      --teal2:#0d9488;
      --danger:#dc2626;
      --warn:#f59e0b;
      --soft:#e7f7f4;
      --shadow:0 16px 36px rgba(15,23,42,.08);
    }

    * { box-sizing:border-box; }

    body {
      margin:0;
      min-height:100svh;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 10% 0%,rgba(20,184,166,.16),transparent 32%),
        radial-gradient(circle at 90% 8%,rgba(59,130,246,.14),transparent 28%),
        linear-gradient(135deg,#f8fbff 0,#edf4f9 48%,#dce9f4 100%);
    }

    .shell {
      width:min(1240px,100%);
      margin:0 auto;
      padding:18px 16px 42px;
    }

    header {
      position:sticky;
      top:0;
      z-index:20;
      margin:-18px -16px 16px;
      padding:16px max(16px,calc((100vw - 1240px) / 2 + 16px)) 13px;
      background:rgba(248,251,255,.9);
      border-bottom:1px solid rgba(148,163,184,.34);
      backdrop-filter:blur(16px);
    }

    .headerRow {
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:18px;
    }

    h1 { margin:0; font-size:26px; letter-spacing:-.02em; }
    .sub { color:var(--muted); font-size:13px; margin-top:4px; }

    .status {
      display:flex;
      flex-wrap:wrap;
      justify-content:flex-end;
      gap:8px;
      min-width:220px;
      margin-top:2px;
    }

    .pill {
      border:1px solid var(--line);
      background:#fff;
      color:#334155;
      border-radius:999px;
      padding:7px 11px;
      font-size:12px;
      font-weight:750;
      line-height:1;
      white-space:nowrap;
    }

    .pill.ready { background:#ecfdf5; color:#115e59; border-color:#5eead4; }
    .pill.bad { background:#fff1f2; color:#991b1b; border-color:#fecaca; }
    .pill.run { background:#eff6ff; color:#1e40af; border-color:#bfdbfe; }

    .notice {
      margin-top:11px;
      display:none;
      padding:9px 11px;
      border:1px solid var(--line);
      background:#fff;
      color:#334155;
      border-radius:12px;
      font-size:13px;
    }

    .notice.show { display:block; }
    .notice.error { border-color:#fecaca; background:#fff1f2; color:#991b1b; }
    .notice.ok { border-color:#99f6e4; background:#ecfdf5; color:#115e59; }

    .card {
      background:rgba(255,255,255,.92);
      border:1px solid rgba(148,163,184,.42);
      border-radius:16px;
      box-shadow:var(--shadow);
      overflow:hidden;
      margin:14px 0;
    }

    .card h2 {
      margin:0;
      padding:14px 15px;
      border-bottom:1px solid rgba(148,163,184,.28);
      font-size:14px;
      display:flex;
      align-items:center;
      gap:8px;
      letter-spacing:-.01em;
    }

    .card h2::before { content:""; width:4px; height:18px; background:var(--teal); border-radius:4px; }
    .content { padding:15px; }

    .pageGrid {
      display:grid;
      grid-template-columns:minmax(320px,390px) minmax(0,1fr);
      gap:16px;
      align-items:start;
    }

    .setupGrid {
      display:grid;
      grid-template-columns:minmax(0,1fr) minmax(0,1fr);
      gap:16px;
      align-items:start;
    }

    .homePanel {
      max-width:980px;
      margin:clamp(36px,12vh,130px) auto 0;
    }

    .homeChoices {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }

    .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .triGrid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    .smallGrid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
    .full { grid-column:1 / -1; }
    .fieldOff { opacity:.42; }
    .fieldOff input, .fieldOff select { background:#f8fafc; }

    label {
      display:block;
      font-size:12px;
      color:#334155;
      font-weight:800;
      margin:0 0 5px;
    }

    input, textarea, select {
      width:100%;
      border:1px solid var(--line);
      border-radius:10px;
      background:#fff;
      color:var(--ink);
      padding:10px 11px;
      font:inherit;
      font-size:14px;
      outline:none;
      min-height:41px;
    }

    textarea {
      min-height:82px;
      resize:vertical;
      font-family:ui-monospace,SFMono-Regular,Consolas,monospace;
      font-size:12px;
      line-height:1.35;
    }

    input:focus, textarea:focus, select:focus {
      border-color:var(--teal);
      box-shadow:0 0 0 3px rgba(15,118,110,.14);
    }

    button {
      border:1px solid var(--line);
      background:#fff;
      border-radius:12px;
      padding:11px 12px;
      font-weight:850;
      color:var(--ink);
      cursor:pointer;
      min-height:42px;
    }

    button:hover { border-color:#94a3b8; }
    button:disabled { opacity:.55; cursor:not-allowed; }
    .primary { background:linear-gradient(135deg,var(--teal),var(--teal2)); color:#fff; border-color:var(--teal2); }
    .danger { color:#991b1b; border-color:#fecaca; background:#fff1f2; }
    .ghost { background:#f8fbff; }

    .seg { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

    .choice {
      text-align:left;
      border:1px solid var(--line);
      background:rgba(255,255,255,.88);
      border-radius:15px;
      padding:15px;
      min-height:94px;
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      justify-content:center;
      gap:6px;
    }

    .choice.big {
      min-height:158px;
      padding:22px;
    }

    .choice.big .choiceTitle { font-size:21px; }
    .choice.big .choiceText { font-size:13px; }

    .choice.active {
      border-color:var(--teal);
      background:linear-gradient(180deg,#f0fdfa,#fff);
      box-shadow:inset 0 0 0 1px rgba(15,118,110,.2);
    }

    .choiceTitle { font-size:16px; font-weight:850; }
    .choiceText { color:var(--muted); font-size:12px; line-height:1.35; font-weight:650; }
    .muted { color:var(--muted); font-size:13px; line-height:1.4; }

    .stepper {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin:0 0 14px;
    }

    .step {
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      padding:11px 12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      color:#475569;
      font-size:13px;
      font-weight:850;
    }

    .step.active { border-color:var(--teal); color:#115e59; background:#f0fdfa; }
    .step span:first-child { display:flex; align-items:center; gap:8px; }
    .dot { width:10px; height:10px; border-radius:99px; background:#94a3b8; display:inline-block; }
    .step.active .dot { background:var(--teal); }

    .resourceBox {
      border:1px solid rgba(148,163,184,.36);
      border-radius:14px;
      background:#fbfdff;
      padding:12px;
    }

    .resourceTop {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:8px;
    }

    .countBadge {
      border:1px solid #99f6e4;
      background:#ecfdf5;
      color:#115e59;
      border-radius:999px;
      padding:5px 9px;
      font-size:12px;
      font-weight:850;
      white-space:nowrap;
    }

    .actionRow {
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:12px;
    }

    .actionRow button { flex:1 1 150px; }

    .channel {
      border:1px solid rgba(148,163,184,.36);
      border-radius:15px;
      background:#fbfdff;
      padding:12px;
      margin:11px 0;
    }

    .pager {
      display:grid;
      grid-template-columns:42px 1fr 42px;
      gap:8px;
      align-items:center;
      margin:0 0 12px;
    }

    .pagerText {
      text-align:center;
      font-weight:850;
      color:#334155;
      font-size:13px;
    }

    .channelTop {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }

    .channelTitle {
      font-weight:850;
      display:flex;
      align-items:center;
      gap:8px;
    }

    .channelTitle::before {
      content:"";
      width:4px;
      height:16px;
      background:var(--teal);
      border-radius:99px;
      display:inline-block;
    }

    .switch {
      display:flex;
      align-items:center;
      gap:8px;
      font-weight:850;
      font-size:13px;
      margin:0;
      border:1px solid #bfdbfe;
      background:#f8fbff;
      border-radius:999px;
      padding:6px 10px;
      min-width:max-content;
    }

    .switch input {
      appearance:none;
      width:34px;
      min-height:20px;
      height:20px;
      border-radius:999px;
      background:#dbeafe;
      border:1px solid #bfdbfe;
      position:relative;
      padding:0;
      cursor:pointer;
    }

    .switch input::before {
      content:"";
      position:absolute;
      width:14px;
      height:14px;
      border-radius:50%;
      left:2px;
      top:2px;
      background:#fff;
      box-shadow:0 1px 3px rgba(15,23,42,.22);
      transition:transform .18s ease;
    }

    .switch input:checked { background:var(--teal); border-color:var(--teal); }
    .switch input:checked::before { transform:translateX(14px); }

    .scopeCh {
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
      margin-top:6px;
    }

    .scopeCh label {
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      border:1px solid var(--line);
      border-radius:10px;
      background:#fff;
      padding:8px;
      margin:0;
    }

    .scopeCh input { width:16px; min-height:16px; height:16px; accent-color:var(--teal); padding:0; }

    .compactList {
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:8px;
    }

    .mini {
      border:1px solid var(--line2);
      background:#f8fbff;
      border-radius:12px;
      padding:10px;
    }

    .mini b { display:block; font-size:13px; margin-bottom:4px; }

    .hidden { display:none !important; }

    body.plotOnly { background:#ffffff; }

    body.plotOnly .shell {
      width:100%;
      max-width:none;
      margin:0;
      padding:0;
    }

    body.plotOnly header { display:none; }

    .spectrumOnly {
      width:100vw;
      min-height:100vh;
      background:#ffffff;
      display:flex;
      align-items:stretch;
      justify-content:center;
      padding:0;
    }

    .spectrumFigure {
      width:100%;
      height:100vh;
      display:block;
      background:#ffffff;
    }

    @media (max-width:900px) {
      .pageGrid, .setupGrid { grid-template-columns:1fr; }
      .headerRow { flex-direction:column; }
      .status { justify-content:flex-start; min-width:0; }
    }

    @media (max-width:640px) {
      .shell { padding:14px 10px 28px; }
      header { margin:-14px -10px 12px; padding:14px 10px 12px; }
      h1 { font-size:22px; }
      .grid, .triGrid, .smallGrid, .seg, .stepper, .compactList { grid-template-columns:1fr; }
      .homeChoices { grid-template-columns:1fr; }
      .scopeCh { grid-template-columns:1fr 1fr; }
      .content { padding:12px; }
      .card { border-radius:14px; margin:11px 0; }
      .choice { min-height:84px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="headerRow">
        <div>
          <h1>Measurement WorkFlow Remote</h1>
          <div class="sub">Remote setup, scan input, and run control</div>
        </div>
        <div id="statusPills" class="status"></div>
      </div>
      <div id="notice" class="notice"></div>
    </header>

    <section id="loginCard" class="card">
      <h2>Login</h2>
      <div class="content grid">
        <div class="full">
          <label>Relay API URL</label>
          <input id="relayUrl" placeholder="https://measurement-workflow-relay.yourname.workers.dev" />
        </div>
        <div>
          <label>Lab ID</label>
          <input id="labId" placeholder="aptm-lab" />
        </div>
        <div>
          <label>Password</label>
          <input id="password" type="password" autocomplete="current-password" />
        </div>
        <button id="loginButton" class="primary full">Login</button>
        <button id="clearLoginButton" class="full" type="button">Clear Saved Login</button>
        <div id="loginMessage" class="muted full">Use the credentials configured in Cloudflare.</div>
      </div>
    </section>

    <main id="app" class="hidden"></main>
  </div>

  <script>
    // Easy text/config edits live here.
    const appName = "Measurement WorkFlow Remote";
    const defaultRelayUrl = location.hostname.endsWith("github.io")
      ? "https://measurement-workflow-relay.hk2799.workers.dev"
      : location.origin;
    const defaultLabId = "aptm-lab";
    const defaultDataFolder = "D:\\Polytec_Software_Code\\Data";

    const settingsKey = "measurement-workflow-remote-settings";
    const tokenKey = "measurement-workflow-remote-token";
    const viewKey = "measurement-workflow-remote-view-v2";

    const modes = ["Sweep Frequency", "Sweep Amplitude", "Sweep Phase", "Fixed Condition"];
    const waveforms = ["Sine", "Square", "Ramp", "Pulse", "Noise"];
    const avgOptions = ["6 (64)", "7 (128)", "8 (256)", "9 (512)"];
    const recordOptions = ["1e3", "1e4", "1e5"];
    const timebaseOptions = ["Fixed FFT Window", "Follow Frequency"];

    const state = {
      token: localStorage.getItem(tokenKey) || "",
      relayUrl: defaultRelayUrl,
      labId: defaultLabId,
      view: "home",
      appState: null,
      desktopOnline: false,
      preset: null,
      dirty: false,
      selectedFgIndex: 0,
      runMonitorId: 0,
      runMonitorAttempts: 0
    };

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
    }

    function checked(value) { return value ? "checked" : ""; }
    function selected(actual, expected) { return Number(actual) === Number(expected) ? "selected" : ""; }
    function value(id) { return document.getElementById(id)?.value ?? ""; }
    function bool(id) { return document.getElementById(id)?.checked ?? false; }
    function countLines(text) { return String(text || "").split(/\r?\n/).map(x => x.trim()).filter(Boolean).length; }
    function keepFolder(value) { return String(value || "").trim() || defaultDataFolder; }

    function setNotice(message, kind = "") {
      const el = document.getElementById("notice");
      el.textContent = message || "";
      el.className = "notice" + (message ? " show" : "") + (kind ? " " + kind : "");
    }

    function loadSavedSettings() {
      try {
        const saved = JSON.parse(localStorage.getItem(settingsKey) || "{}");
        state.relayUrl = saved.relayUrl || defaultRelayUrl;
        state.labId = saved.labId || defaultLabId;
      } catch {}
      document.getElementById("relayUrl").value = state.relayUrl;
      document.getElementById("labId").value = state.labId;
    }

    function saveSettings() {
      localStorage.setItem(settingsKey, JSON.stringify({
        relayUrl: state.relayUrl,
        labId: state.labId
      }));
    }

    async function api(path, options = {}) {
      const root = state.relayUrl.replace(/\/+$/, "");
      const headers = options.headers || {};
      if (state.token) headers.Authorization = "Bearer " + state.token;
      if (options.body && !headers["Content-Type"]) headers["Content-Type"] = "application/json";
      const response = await fetch(root + path, { ...options, headers });
      const raw = await response.text();
      let payload = null;
      try {
        payload = raw ? JSON.parse(raw) : null;
      } catch {
        payload = { success:false, message:raw || response.statusText };
      }
      if (!response.ok || payload?.success === false) {
        throw new Error(payload?.message || response.statusText);
      }

      return payload;
    }

    async function login() {
      state.relayUrl = document.getElementById("relayUrl").value.trim().replace(/\/+$/, "");
      state.labId = document.getElementById("labId").value.trim();
      const password = document.getElementById("password").value;
      if (!state.relayUrl || !state.labId || !password) {
        document.getElementById("loginMessage").textContent = "Relay URL, Lab ID, and password are required.";
        return;
      }

      saveSettings();
      try {
        const payload = await api("/api/login", {
          method: "POST",
          body: JSON.stringify({ labId: state.labId, password })
        });
        state.token = payload.token;
        localStorage.setItem(tokenKey, state.token);
        document.getElementById("loginMessage").textContent = "Logged in.";
        await refreshStatus();
        showApp();
      } catch (error) {
        document.getElementById("loginMessage").textContent = error.message;
      }
    }

    function clearSavedLogin() {
      state.token = "";
      localStorage.removeItem(tokenKey);
      if (state.runMonitorId) clearInterval(state.runMonitorId);
      state.runMonitorId = 0;
      document.body.classList.remove("plotOnly");
      document.getElementById("loginCard").classList.remove("hidden");
      document.getElementById("app").classList.add("hidden");
      setNotice("");
      setPills();
      document.getElementById("loginMessage").textContent = "Saved login cleared. Enter the current password.";
    }

    async function refreshStatus(options = {}) {
      const payload = await api("/api/status?labId=" + encodeURIComponent(state.labId));
      state.desktopOnline = payload.status?.desktopOnline === true;
      state.appState = state.desktopOnline ? (payload.status?.appState || null) : null;
      const remotePreset = normalizePreset(
        state.desktopOnline
          ? (payload.status?.appState?.preset || state.preset || defaultPreset())
          : defaultPreset());
      if (state.dirty && options.preserveDraft !== false) {
        setPills();
        return;
      }

      state.preset = remotePreset;
      state.selectedFgIndex = Math.min(state.selectedFgIndex, Math.max(0, currentFgCount(state.preset) - 1));
      render();
      updateRunMonitorFromStatus();
    }

    function updateRunMonitorFromStatus() {
      if (state.appState?.running === true && !completedTransmissionSpectrum()) {
        if (!state.runMonitorId) startRunMonitor();
        return;
      }

      if (state.runMonitorId && completedTransmissionSpectrum()) {
        clearInterval(state.runMonitorId);
        state.runMonitorId = 0;
      }
    }

    function showApp() {
      document.getElementById("loginCard").classList.add("hidden");
      document.getElementById("app").classList.remove("hidden");
      render();
    }

    function defaultPreset() {
      return {
        Equipment: "LaserDopplerVibrometer",
        OutputRoot: defaultDataFolder,
        MassCount: "",
        SettleSeconds: "10",
        ScopeOutputRoot: defaultDataFolder,
        OscilloscopeResources: "",
        ScopeGeneratorResources: "",
        ScopeExperimentSettleSeconds: "10",
        ScopeSettleSeconds: "1",
        ScopeAverageIndex: 1,
        ScopeRecordLengthIndex: 2,
        ScopeTimebaseIndex: 0,
        ModeIndex: 0,
        ScanTypeIndex: 0,
        VisaResources: "",
        StateRatioFrequency: "",
        StateRatioCh1FrequencyLow: "",
        StateRatioCh1FrequencyHigh: "",
        StateRatioCh1FrequencyStep: "",
        StateRatioCh1FixedFrequency: "",
        StateRatioCh1FrequencyDivisionIndex: 0,
        StateRatioCh2FrequencyLow: "",
        StateRatioCh2FrequencyHigh: "",
        StateRatioCh2FrequencyStep: "",
        StateRatioCh2FixedFrequency: "",
        StateRatioCh2FrequencyDivisionIndex: 0,
        StateRatioSameFrequency: true,
        StateRatioTargetFunctionGeneratorIndex: 1,
        StateRatioLimit: "4",
        StateRatioSweepIndex: 0,
        StateRatioSweepTag: "Frequency",
        EpsilonLow: "",
        EpsilonHigh: "",
        EpsilonStep: "",
        FixedEpsilon: "",
        DeltaLow: "",
        DeltaHigh: "",
        DeltaStep: "",
        FixedDelta: "",
        EpsilonDivisionIndex: 0,
        DeltaDivisionIndex: 0,
        SkipCompletedScans: false,
        Channels: [],
        FunctionGenerators: [],
        ScopeChannels: []
      };
    }

    function normalizePreset(raw) {
      const base = defaultPreset();
      const preset = { ...base, ...(raw || {}) };
      preset.OutputRoot = keepFolder(preset.OutputRoot);
      preset.ScopeOutputRoot = keepFolder(preset.ScopeOutputRoot);
      preset.SettleSeconds = preset.SettleSeconds || "10";
      preset.ScopeExperimentSettleSeconds = preset.ScopeExperimentSettleSeconds || "10";
      preset.ScopeSettleSeconds = preset.ScopeSettleSeconds || "1";
      preset.StateRatioLimit = preset.StateRatioLimit || "4";
      preset.Channels = Array.isArray(preset.Channels) ? preset.Channels : [];
      preset.FunctionGenerators = Array.isArray(preset.FunctionGenerators) ? preset.FunctionGenerators : [];
      preset.ScopeChannels = Array.isArray(preset.ScopeChannels) ? preset.ScopeChannels : [];
      if (preset.Equipment !== "Oscilloscope" && Number(preset.ScanTypeIndex || 0) === 1) {
        preset.ModeIndex = 0;
      }

      if (preset.Equipment !== "Oscilloscope" && Number(preset.ModeIndex || 0) === 1) {
        for (const channel of preset.Channels) {
          if (Number(channel?.ModeIndex || 0) === 2) channel.ModeIndex = 0;
          if (channel) {
            channel.PhaseLow = "";
            channel.PhaseHigh = "";
            channel.PhaseStep = "";
            channel.FixedPhase = "";
          }
        }
      }
      return preset;
    }

    function setPills() {
      if (!state.desktopOnline) {
        document.getElementById("statusPills").innerHTML = `
          <span class="pill bad">Remote off</span>
          <span class="pill">Idle</span>
          <span class="pill">Desktop not connected</span>
        `;
        return;
      }

      const ready = state.appState?.ready === true;
      const running = state.appState?.running === true;
      const equipment = state.appState?.equipmentLabel || equipmentLabel(state.preset?.Equipment) || "Scan";
      const last = state.appState?.lastCommand?.message || "";
      document.getElementById("statusPills").innerHTML = `
        <span class="pill ${ready ? "ready" : "bad"}">${ready ? "Ready" : "Not ready"}</span>
        <span class="pill ${running ? "run" : ""}">${running ? "Running" : "Idle"}</span>
        <span class="pill">${esc(equipment)}</span>
        ${last ? `<span class="pill">${esc(last)}</span>` : ""}
      `;
    }

    function equipmentLabel(equipment) {
      return equipment === "Oscilloscope" ? "Oscilloscope" : "Laser Doppler Vibrometer";
    }

    function currentFgCount(p = state.preset) {
      if (p?.Equipment !== "Oscilloscope" && Number(p?.ModeIndex || 0) === 1) {
        return 2;
      }

      const resourceText = p?.Equipment === "Oscilloscope" ? p.ScopeGeneratorResources : p.VisaResources;
      const fromText = countLines(resourceText);
      const fromApp = state.dirty ? 0 : state.appState?.activeFunctionGenerators || 0;
      return Math.max(0, Math.min(5, fromText || fromApp || 0));
    }

    function currentScopeCount(p = state.preset) {
      const fromText = countLines(p?.OscilloscopeResources);
      const fromApp = state.dirty ? 0 : state.appState?.activeOscilloscopes || 0;
      return Math.max(0, Math.min(5, fromText || fromApp || 0));
    }

    function render() {
      state.preset = normalizePreset(state.preset || defaultPreset());
      setPills();
      const completedSpectrum = completedTransmissionSpectrum();
      document.body.classList.toggle("plotOnly", !!completedSpectrum);
      if (completedSpectrum) {
        document.getElementById("app").innerHTML = renderSpectrumOnly(completedSpectrum);
        return;
      }

      if (state.view === "home") {
        document.getElementById("app").innerHTML = renderHomePage();
        wirePage();
        return;
      }

      document.getElementById("app").innerHTML = `
        ${renderStepper()}
        ${state.view === "setup" ? renderSetupPage(state.preset) : renderInputPage(state.preset)}
      `;
      wirePage();
    }

    function completedTransmissionSpectrum() {
      const spectrum = state.appState?.transmissionSpectrum;
      if (!state.desktopOnline || !spectrum?.complete || !Array.isArray(spectrum.scans) || spectrum.scans.length === 0) {
        return null;
      }

      return spectrum;
    }

    function renderSpectrumOnly(spectrum) {
      return `<section class="spectrumOnly">${renderTransmissionSpectrumSvg(spectrum)}</section>`;
    }

    function renderTransmissionSpectrumSvg(spectrum) {
      const scans = Array.isArray(spectrum.scans) ? spectrum.scans : [];
      const axis = spectrum.axis || {};
      const massIndexes = [...new Set(scans.flatMap(scan => (scan.metrics || []).map(metric => Number(metric.massIndex))))]
        .filter(Number.isFinite)
        .sort((a,b) => a - b);
      const panels = [
        { key:"amplitude", title:"Amplitude Response", yLabel:"Max Amp", value:metric => metric.amplitude == null ? NaN : Number(metric.amplitude) },
        { key:"phaseBetween", title:"Phase Response between Masses", yLabel:"Phase [rad]", value:metric => metric.phaseFromMass1Radians == null ? NaN : Number(metric.phaseFromMass1Radians) },
        { key:"phaseDriver", title:"Phase Response of Mass and Driver", yLabel:"Phase [rad]", value:metric => metric.massDriverPhaseRadians == null ? NaN : Number(metric.massDriverPhaseRadians) }
      ];
      const width = 1200;
      const height = 720;
      const left = 88;
      const right = 34;
      const top = 70;
      const bottom = 72;
      const gap = 34;
      const panelHeight = (height - top - bottom - gap * 2) / 3;
      const plotWidth = width - left - right;
      const xs = scans.map(scan => Number(scan.x)).filter(Number.isFinite);
      const xRange = paddedRange(xs.length ? xs : [0, 1], Number(axis.low), Number(axis.high));
      const colors = ["#2563eb","#0d9488","#ea580c","#7c3aed","#dc2626","#0891b2","#65a30d","#be185d","#9333ea","#f59e0b"];
      const text = (x,y,value,size=12,anchor="start",weight=500) =>
        `<text x="${x}" y="${y}" font-family="Segoe UI, Arial, sans-serif" font-size="${size}" font-weight="${weight}" text-anchor="${anchor}" fill="#0f172a">${esc(value)}</text>`;
      const line = (x1,y1,x2,y2,stroke="#dbe5ef",sw=1) =>
        `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${stroke}" stroke-width="${sw}"/>`;
      const mapX = x => left + (x - xRange.min) / (xRange.max - xRange.min || 1) * plotWidth;
      let svg = `<svg class="spectrumFigure" viewBox="0 0 ${width} ${height}" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Transmission spectrum plot">`;
      svg += `<rect width="${width}" height="${height}" fill="#ffffff"/>`;
      svg += text(26, 32, "Amplitude and Phase", 18, "start", 700);

      panels.forEach((panel, panelIndex) => {
        const yTop = top + panelIndex * (panelHeight + gap);
        const yBottom = yTop + panelHeight;
        const values = scans.flatMap(scan => (scan.metrics || []).map(panel.value)).filter(Number.isFinite);
        const yRange = panel.key === "phaseBetween" || panel.key === "phaseDriver"
          ? { min:0, max:Math.PI }
          : paddedRange(values.length ? values : [0, 1]);
        const mapY = y => yBottom - (y - yRange.min) / (yRange.max - yRange.min || 1) * panelHeight;

        svg += text(left, yTop - 12, panel.title, 12, "start", 700);
        svg += `<rect x="${left}" y="${yTop}" width="${plotWidth}" height="${panelHeight}" fill="#ffffff" stroke="#cbd5e1"/>`;
        for (let i = 0; i <= 4; i++) {
          const gx = left + plotWidth * i / 4;
          const gy = yBottom - panelHeight * i / 4;
          svg += line(gx, yTop, gx, yBottom);
          svg += line(left, gy, left + plotWidth, gy);
          const yValue = yRange.min + (yRange.max - yRange.min) * i / 4;
          svg += text(left - 10, gy + 4, formatPlotNumber(yValue), 10, "end", 500);
        }
        svg += line(left, yBottom, left + plotWidth, yBottom, "#334155", 1.2);
        svg += line(left, yTop, left, yBottom, "#334155", 1.2);
        svg += `<text x="28" y="${yTop + panelHeight / 2}" transform="rotate(-90 28 ${yTop + panelHeight / 2})" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#0f172a" text-anchor="middle">${esc(panel.yLabel)}</text>`;

        massIndexes.forEach((massIndex, colorIndex) => {
          const points = [];
          scans.forEach(scan => {
            const metric = (scan.metrics || []).find(item => Number(item.massIndex) === massIndex);
            if (!metric) return;
            const y = panel.value(metric);
            const x = Number(scan.x);
            if (!Number.isFinite(x) || !Number.isFinite(y)) return;
            points.push({ x:mapX(x), y:mapY(y) });
          });
          if (points.length === 0) return;
          const color = colors[colorIndex % colors.length];
          if (points.length > 1) {
            svg += `<polyline points="${points.map(point => `${point.x.toFixed(2)},${point.y.toFixed(2)}`).join(" ")}" fill="none" stroke="${color}" stroke-width="2"/>`;
          }
          points.forEach(point => {
            svg += `<circle cx="${point.x.toFixed(2)}" cy="${point.y.toFixed(2)}" r="4" fill="${color}" stroke="#fff" stroke-width="1"/>`;
          });
        });

        if (panelIndex === panels.length - 1) {
          drawXAxisTicks().forEach(tick => {
            const x = mapX(tick.value);
            svg += text(x, yBottom + 20, tick.label, 10, "middle", 500);
          });
          if (axis.label) svg += text(left + plotWidth / 2, yBottom + 48, axis.label, 12, "middle", 500);
        }
      });

      massIndexes.forEach((massIndex, index) => {
        const column = Math.floor(index / 3);
        const row = index % 3;
        const x = width - 200 + column * 78;
        const y = 28 + row * 18;
        const color = colors[index % colors.length];
        svg += line(x, y - 4, x + 18, y - 4, color, 2.4);
        svg += text(x + 24, y, `Mass ${massIndex}`, 11, "start", 500);
      });

      svg += `</svg>`;
      return svg;

      function drawXAxisTicks() {
        const values = Array.isArray(axis.primaryTickValues) ? axis.primaryTickValues.map(Number) : [];
        const labels = Array.isArray(axis.primaryTickLabels) ? axis.primaryTickLabels : [];
        if (values.length && labels.length) {
          return values.slice(0, labels.length).map((value, index) => ({ value, label:String(labels[index]) })).filter(tick => Number.isFinite(tick.value));
        }
        return [0,1,2,3,4].map(i => {
          const value = xRange.min + (xRange.max - xRange.min) * i / 4;
          return { value, label:formatPlotNumber(value) };
        });
      }
    }

    function paddedRange(values, explicitLow = NaN, explicitHigh = NaN) {
      if (Number.isFinite(explicitLow) && Number.isFinite(explicitHigh) && explicitHigh > explicitLow) {
        return { min:explicitLow, max:explicitHigh };
      }
      let min = Math.min(...values);
      let max = Math.max(...values);
      if (!Number.isFinite(min) || !Number.isFinite(max)) return { min:0, max:1 };
      if (Math.abs(max - min) < 1e-12) {
        const pad = Math.max(1, Math.abs(max) * 0.1);
        return { min:min - pad, max:max + pad };
      }
      const pad = (max - min) * 0.08;
      return { min:min - pad, max:max + pad };
    }

    function formatPlotNumber(value) {
      if (!Number.isFinite(value)) return "";
      const abs = Math.abs(value);
      if ((abs > 0 && abs < 1e-3) || abs >= 1e4) return value.toExponential(2);
      return Number(value.toPrecision(4)).toString();
    }

    function renderScopeSetup(p) {
      return `<section class="card">
        <h2>Oscilloscope Setup</h2>

    function stateRatioTargetGeneratorControl(p) {
      const stateRatio = Number(p.ScanTypeIndex || 0) === 1;
      const fgCount = Math.max(1, currentFgCount(p));

      const targetOptions = Array.from({ length: fgCount }, (_, index) =>
        `<option value="${index + 1}" ${selected(targetFg, index + 1)}>Function Generator ${index + 1}</option>`)
        .join("");
      return `<div class="${stateRatio ? "" : "fieldOff"}">
        <label>Function Generator</label>
        <select id="StateRatioTargetFunctionGeneratorIndex" ${stateRatio && fgCount > 1 ? "" : "disabled"}>

    function renderInputPage(p) {

                <button data-view="setup">Back to Setup</button>

                <button data-command="pause">Pause</button>

        </div>
        <div>
          ${isStateRatio ? renderStateRatioInputs(p) : renderFunctionGenerators(p)}

      </div>`;
    }

    function renderFunctionGenerators(p) {
      const fgCount = currentFgCount(p);
      const channels = p.Channels || [];
      const outputs = p.FunctionGenerators || [];
      const internalGenerator = p.Equipment !== "Oscilloscope" && Number(p.ModeIndex || 0) === 1;
      if (fgCount <= 0) {
        return `<section class="card"><h2>Function Generators</h2><div class="content muted">Detect Or Enter Function-Generator VISA Resources In Setup Before Entering Channel Inputs.</div></section>`;
      }

      if (internalGenerator) {
        let internalHtml = `<section class="card"><h2>PSV Internal Generator</h2><div class="content"><div class="muted">The PSV Internal Generator Exposes Four Channels With Phase Fixed At 0 Degrees.</div>`;
        for (let index = 0; index < 4; index++) {
          internalHtml += renderChannel(index, channels[index] || {}, false, `CH${index + 1}`);
        }
        return internalHtml + `</div></section>`;
      }

      state.selectedFgIndex = Math.min(state.selectedFgIndex, fgCount - 1);
      const visibleFg = state.selectedFgIndex;
      let html = `<section class="card"><h2>Function Generators</h2><div class="content">`;
      if (fgCount > 1) {
        html += `<div class="pager">
          <button data-fg-prev>&lt;</button>
          <div class="pagerText">Function Generator ${visibleFg + 1} of ${fgCount}</div>
          <button data-fg-next>&gt;</button>
        </div>`;
      }

      for (let fg = visibleFg; fg <= visibleFg; fg++) {
        const output = outputs[fg] || {};
        html += `<div class="channel">
          <div class="channelTop"><div class="channelTitle">B&K Precision 4055B FG ${fg + 1}</div></div>
          <div class="grid">
            <div class="full"><label>Waveform</label><select id="fg${fg}_WaveformIndex">${waveforms.map((w,i) => `<option value="${i}" ${selected(output.WaveformIndex,i)}>${w}</option>`).join("")}</select></div>
            <label class="switch"><input id="fg${fg}_CouplingEnabled" type="checkbox" ${checked(output.CouplingEnabled)}> CH coupling</label>
            <div><label>Source CH</label><select id="fg${fg}_SourceChannelIndex"><option value="0" ${selected(output.SourceChannelIndex,0)}>CH1</option><option value="1" ${selected(output.SourceChannelIndex,1)}>CH2</option></select></div>
            <label class="switch"><input id="fg${fg}_WaveCombineEnabled" type="checkbox" ${checked(output.WaveCombineEnabled)}> Wave combine</label>
            <div><label>Output CH</label><select id="fg${fg}_WaveCombineOutputIndex"><option value="0" ${selected(output.WaveCombineOutputIndex,0)}>CH1</option><option value="1" ${selected(output.WaveCombineOutputIndex,1)}>CH2</option></select></div>
          </div>`;
        for (let ch = 0; ch < 2; ch++) html += renderChannel(fg * 2 + ch, channels[fg * 2 + ch] || {}, true, `CH${ch + 1}`);
        html += `</div>`;
      }
      return html + `</div></section>`;
    }

    function renderChannel(index, channel, phaseSupported = true, label = `CH${(index % 2) + 1}`) {
      const used = channel.Used === true;
      const modeIndex = phaseSupported ? Number(channel.ModeIndex || 0) : Math.min(Number(channel.ModeIndex || 0), 1);
      const modeOptions = modes
        .map((m,i) => phaseSupported || i !== 2
          ? `<option value="${i}" ${selected(modeIndex,i)}>${m}</option>`
          : "")
        .join("");
      const field = (name, title, rowClass = "") => {
        const active = channelFieldActive(used, modeIndex, name, phaseSupported);
        return `<div class="${active ? "" : "fieldOff"} ${rowClass}">
          <label>${title}</label>
          <input id="ch${index}_${name}" inputmode="decimal" value="${esc(channel[name])}" ${active ? "" : "disabled"}>
        </div>`;
      };
      return `<div class="channel">
        <div class="channelTop">
          <div class="channelTitle">${esc(label)}</div>
          <label class="switch"><input id="ch${index}_Used" type="checkbox" ${checked(channel.Used)}> Use</label>
        </div>
        <label>Mode</label>
        <select id="ch${index}_ModeIndex" ${used ? "" : "disabled"}>${modeOptions}</select>
        <div class="smallGrid" style="margin-top:9px">
          ${field("FrequencyLow", "Freq low")}
          ${field("FrequencyHigh", "Freq high")}
          ${field("FrequencyStep", "Freq step")}
          ${field("FixedFrequency", "Freq fixed")}
          ${field("AmplitudeLow", "Amp low")}
          ${field("AmplitudeHigh", "Amp high")}
          ${field("AmplitudeStep", "Amp step")}
          ${field("FixedAmplitude", "Amp fixed")}
          ${phaseSupported ? field("PhaseLow", "Phase low") : ""}
          ${phaseSupported ? field("PhaseHigh", "Phase high") : ""}
          ${phaseSupported ? field("PhaseStep", "Phase step") : ""}
          ${phaseSupported ? field("FixedPhase", "Phase fixed") : ""}
        </div>
      </div>`;
    }

    function channelFieldActive(used, modeIndex, name, phaseSupported) {
      if (!used) return false;
      if (!phaseSupported && name.toLowerCase().includes("phase")) return false;
      if (modeIndex === 0) {
        return ["FrequencyLow", "FrequencyHigh", "FrequencyStep", "FixedAmplitude", "FixedPhase"].includes(name);
      }
      if (modeIndex === 1) {
        return ["FixedFrequency", "AmplitudeLow", "AmplitudeHigh", "AmplitudeStep", "FixedPhase"].includes(name);
      }
      if (modeIndex === 2) {
        return phaseSupported && ["FixedFrequency", "FixedAmplitude", "PhaseLow", "PhaseHigh", "PhaseStep"].includes(name);
      }
      return ["FixedFrequency", "FixedAmplitude", "FixedPhase"].includes(name);
    }

    function renderLdvAcquisition(p) {
      return `<section class="card"><h2>Laser Doppler Vibrometer</h2><div class="content grid">

    function renderStateRatioInputs(p) {
      const sweepIndex = Number(p.StateRatioSweepIndex || 0);
      const sweepFrequency = sweepIndex === 0;
      const sweepEpsilon = sweepIndex === 1;
      const sweepDelta = sweepIndex === 2;
      const sameFrequency = p.StateRatioSameFrequency !== false;
      const field = (id, label, enabled) => `<div class="${enabled ? "" : "fieldOff"}">
        <label>${label}</label>
        <input id="${id}" inputmode="decimal" value="${esc(p[id])}" ${enabled ? "" : "disabled"}>
      </div>`;
      const frequencyField = (prefix, label) => `<div class="full">
        <div style="font-weight:700;margin:4px 0 6px">${label} Frequency Hz</div>
        <div class="smallGrid">
          <div class="${sweepFrequency ? "" : "fieldOff"}"><label>Low</label><input id="${prefix}FrequencyLow" inputmode="decimal" value="${esc(p[`${prefix}FrequencyLow`])}" ${sweepFrequency ? "" : "disabled"}></div>
          <div class="${sweepFrequency ? "" : "fieldOff"}"><label>High</label><input id="${prefix}FrequencyHigh" inputmode="decimal" value="${esc(p[`${prefix}FrequencyHigh`])}" ${sweepFrequency ? "" : "disabled"}></div>
          <div class="${sweepFrequency ? "" : "fieldOff"}"><label>Step/points</label><input id="${prefix}FrequencyStep" inputmode="decimal" value="${esc(p[`${prefix}FrequencyStep`])}" ${sweepFrequency ? "" : "disabled"}></div>
          <div class="${sweepFrequency ? "fieldOff" : ""}"><label>Fixed</label><input id="${prefix}FixedFrequency" inputmode="decimal" value="${esc(p[`${prefix}FixedFrequency`] || p.StateRatioFrequency)}" ${sweepFrequency ? "disabled" : ""}></div>
        </div>
        <select id="${prefix}FrequencyDivisionIndex" style="max-width:180px;margin-top:8px" ${sweepFrequency ? "" : "disabled"}>
          <option value="0" ${selected(p[`${prefix}FrequencyDivisionIndex`],0)}>Divide by step</option>
          <option value="1" ${selected(p[`${prefix}FrequencyDivisionIndex`],1)}>Divide by points</option>
        </select>
      </div>`;
      return `<section class="card"><h2>ε and δ₀ Sweep</h2><div class="content grid">
        <div><label>Amplitude cap Vpp</label><input id="StateRatioLimit" inputmode="decimal" value="${esc(p.StateRatioLimit || "4")}"></div>
        <div>
          <label>Sweep</label>
          <select id="StateRatioSweepIndex">
            <option value="0" ${selected(p.StateRatioSweepIndex,0)}>Sweep Frequency</option>
            <option value="1" ${selected(p.StateRatioSweepIndex,1)}>Sweep ε</option>
            <option value="2" ${selected(p.StateRatioSweepIndex,2)}>Sweep δ₀</option>
          </select>
        </div>
        <div class="full">
          <label class="switch"><input id="StateRatioSameFrequency" type="checkbox" ${checked(sameFrequency)}> Same Frequency For CH1 And CH2</label>
        </div>
        ${frequencyField("StateRatioCh1", sameFrequency ? "Shared" : "CH1")}
        ${sameFrequency ? "" : frequencyField("StateRatioCh2", "CH2")}
        <div>
          <label>ε divide</label>
          <select id="EpsilonDivisionIndex" ${sweepEpsilon ? "" : "disabled"}>
            <option value="0" ${selected(p.EpsilonDivisionIndex,0)}>Divide by step</option>
            <option value="1" ${selected(p.EpsilonDivisionIndex,1)}>Divide by points</option>
          </select>
        </div>
        <div>
          <label>δ₀ divide</label>
          <select id="DeltaDivisionIndex" ${sweepDelta ? "" : "disabled"}>
            <option value="0" ${selected(p.DeltaDivisionIndex,0)}>Divide by step</option>
            <option value="1" ${selected(p.DeltaDivisionIndex,1)}>Divide by points</option>
          </select>
        </div>
        ${field("EpsilonLow", "ε low", sweepEpsilon)}
        ${field("EpsilonHigh", "ε high", sweepEpsilon)}
        ${field("EpsilonStep", "ε step/points", sweepEpsilon)}
        ${field("FixedEpsilon", "Fixed ε", !sweepEpsilon)}
        ${field("DeltaLow", "δ₀ low", sweepDelta)}
        ${field("DeltaHigh", "δ₀ high", sweepDelta)}
        ${field("DeltaStep", "δ₀ step/points", sweepDelta)}
        ${field("FixedDelta", "Fixed δ₀", !sweepDelta)}
      </div></section>`;
    }

    function renderScopeAcquisition(p) {
      const count = currentScopeCount(p);
      const scopes = p.ScopeChannels || [];
      let html = `<section class="card"><h2>Oscilloscope Settings</h2><div class="content">
        <div class="grid">
          <div>
            <label>Experiment settle (s)</label>
            <input id="ScopeExperimentSettleSeconds" inputmode="decimal" value="${esc(p.ScopeExperimentSettleSeconds || "10")}">
          </div>
          <div>
            <label>Scope settle (s)</label>
            <input id="ScopeSettleSeconds" inputmode="decimal" value="${esc(p.ScopeSettleSeconds || "1")}">
          </div>
          <div>
            <label>Averaging</label>
            <select id="ScopeAverageIndex">${avgOptions.map((item,i) => `<option value="${i}" ${selected(p.ScopeAverageIndex,i)}>${item}</option>`).join("")}</select>
          </div>
          <div>
            <label>Record length</label>
            <select id="ScopeRecordLengthIndex">${recordOptions.map((item,i) => `<option value="${i}" ${selected(p.ScopeRecordLengthIndex,i)}>${item}</option>`).join("")}</select>
          </div>
          <div class="full">
            <label>Timebase mode</label>
            <select id="ScopeTimebaseIndex">${timebaseOptions.map((item,i) => `<option value="${i}" ${selected(p.ScopeTimebaseIndex,i)}>${item}</option>`).join("")}</select>
          </div>
        </div>`;
      if (count <= 0) {
        return html + `<div class="muted">Detect or enter oscilloscope VISA resources in Setup before selecting signal channels.</div></div></section>`;
      }

      for (let i = 0; i < count; i++) {
        const scope = scopes[i] || { Channels: [], TriggerIndex: 0 };
        html += `<div class="channel">
          <div class="channelTitle">Tektronix Scope ${i + 1}</div>
          <label style="margin-top:10px">Signal channels</label>
          <div class="scopeCh">`;
        for (let ch = 0; ch < 4; ch++) {
          html += `<label><input id="scope${i}_ch${ch}" type="checkbox" ${checked((scope.Channels || [])[ch])}> CH${ch + 1}</label>`;
        }
        html += `</div>
          <label style="margin-top:10px">Trigger</label>
          <select id="scope${i}_TriggerIndex">
            <option value="0" ${selected(scope.TriggerIndex,0)}>CH1</option>
            <option value="1" ${selected(scope.TriggerIndex,1)}>CH2</option>
            <option value="2" ${selected(scope.TriggerIndex,2)}>CH3</option>
            <option value="3" ${selected(scope.TriggerIndex,3)}>CH4</option>
          </select>
        </div>`;
      }
      return html + `</div></section>`;
    }

    function formatLdvMode(value) {
      return String(value || "").toLowerCase().includes("fft") ? "FFT" : "Time";
    }

    function collect() {
      const p = normalizePreset(JSON.parse(JSON.stringify(state.preset || defaultPreset())));
      const activeEquipment = document.querySelector("[data-equipment].active")?.dataset.equipment;
      if (activeEquipment) p.Equipment = activeEquipment;

      if (document.getElementById("OutputRoot")) p.OutputRoot = keepFolder(value("OutputRoot"));
      if (document.getElementById("MassCount")) p.MassCount = value("MassCount");
      if (document.getElementById("SettleSeconds")) p.SettleSeconds = value("SettleSeconds") || "10";
      if (document.getElementById("ModeIndex")) p.ModeIndex = Number(value("ModeIndex") || 0);
      if (document.getElementById("ScanTypeIndex")) p.ScanTypeIndex = Number(value("ScanTypeIndex") || 0);
      if (document.getElementById("VisaResources")) p.VisaResources = value("VisaResources");

      if (document.getElementById("ScopeOutputRoot")) p.ScopeOutputRoot = keepFolder(value("ScopeOutputRoot"));
      if (document.getElementById("OscilloscopeResources")) p.OscilloscopeResources = value("OscilloscopeResources");
      if (document.getElementById("ScopeGeneratorResources")) p.ScopeGeneratorResources = value("ScopeGeneratorResources");
      if (document.getElementById("ScopeExperimentSettleSeconds")) p.ScopeExperimentSettleSeconds = value("ScopeExperimentSettleSeconds") || "10";
      if (document.getElementById("ScopeSettleSeconds")) p.ScopeSettleSeconds = value("ScopeSettleSeconds") || "1";
      if (document.getElementById("ScopeAverageIndex")) p.ScopeAverageIndex = Number(value("ScopeAverageIndex") || 0);
      if (document.getElementById("ScopeRecordLengthIndex")) p.ScopeRecordLengthIndex = Number(value("ScopeRecordLengthIndex") || 0);
      if (document.getElementById("ScopeTimebaseIndex")) p.ScopeTimebaseIndex = Number(value("ScopeTimebaseIndex") || 0);

      for (const name of ["StateRatioFrequency","StateRatioLimit","StateRatioCh1FrequencyLow","StateRatioCh1FrequencyHigh","StateRatioCh1FrequencyStep","StateRatioCh1FixedFrequency","StateRatioCh2FrequencyLow","StateRatioCh2FrequencyHigh","StateRatioCh2FrequencyStep","StateRatioCh2FixedFrequency","EpsilonLow","EpsilonHigh","EpsilonStep","FixedEpsilon","DeltaLow","DeltaHigh","DeltaStep","FixedDelta"]) {
        if (document.getElementById(name)) p[name] = value(name);
      }
      if (document.getElementById("StateRatioCh1FrequencyDivisionIndex")) p.StateRatioCh1FrequencyDivisionIndex = Number(value("StateRatioCh1FrequencyDivisionIndex") || 0);
      if (document.getElementById("StateRatioCh2FrequencyDivisionIndex")) p.StateRatioCh2FrequencyDivisionIndex = Number(value("StateRatioCh2FrequencyDivisionIndex") || 0);
      if (document.getElementById("StateRatioTargetFunctionGeneratorIndex")) {
        p.StateRatioTargetFunctionGeneratorIndex = Number(value("StateRatioTargetFunctionGeneratorIndex") || 1);
      }
      if (document.getElementById("StateRatioSameFrequency")) {
        p.StateRatioSameFrequency = bool("StateRatioSameFrequency");
        if (p.StateRatioSameFrequency) {
          p.StateRatioCh2FrequencyLow = p.StateRatioCh1FrequencyLow;
          p.StateRatioCh2FrequencyHigh = p.StateRatioCh1FrequencyHigh;
          p.StateRatioCh2FrequencyStep = p.StateRatioCh1FrequencyStep;
          p.StateRatioCh2FixedFrequency = p.StateRatioCh1FixedFrequency;
          p.StateRatioCh2FrequencyDivisionIndex = p.StateRatioCh1FrequencyDivisionIndex;
        }
      }
      if (document.getElementById("StateRatioSweepIndex")) {
        p.StateRatioSweepIndex = Number(value("StateRatioSweepIndex") || 0);
        p.StateRatioSweepTag = ["Frequency", "Epsilon", "Delta0"][p.StateRatioSweepIndex] || "Frequency";
      }
      if (document.getElementById("EpsilonDivisionIndex")) p.EpsilonDivisionIndex = Number(value("EpsilonDivisionIndex") || 0);
      if (document.getElementById("DeltaDivisionIndex")) p.DeltaDivisionIndex = Number(value("DeltaDivisionIndex") || 0);
      if (document.getElementById("SkipCompletedScans")) p.SkipCompletedScans = bool("SkipCompletedScans");

      p.Channels = p.Channels || [];
      p.FunctionGenerators = p.FunctionGenerators || [];
      const fgCount = currentFgCount(p);
      for (let fg = 0; fg < fgCount; fg++) {
        p.FunctionGenerators[fg] = p.FunctionGenerators[fg] || {};
        if (document.getElementById(`fg${fg}_WaveformIndex`)) {
          p.FunctionGenerators[fg].WaveformIndex = Number(value(`fg${fg}_WaveformIndex`) || 0);
          p.FunctionGenerators[fg].CouplingEnabled = bool(`fg${fg}_CouplingEnabled`);
          p.FunctionGenerators[fg].SourceChannelIndex = Number(value(`fg${fg}_SourceChannelIndex`) || 0);
          p.FunctionGenerators[fg].WaveCombineEnabled = bool(`fg${fg}_WaveCombineEnabled`);
          p.FunctionGenerators[fg].WaveCombineOutputIndex = Number(value(`fg${fg}_WaveCombineOutputIndex`) || 0);
        }
        for (let ch = 0; ch < 2; ch++) {
          const index = fg * 2 + ch;
          p.Channels[index] = p.Channels[index] || {};
          if (document.getElementById(`ch${index}_Used`)) {
            p.Channels[index].Used = bool(`ch${index}_Used`);
            p.Channels[index].ModeIndex = Number(value(`ch${index}_ModeIndex`) || 0);
            for (const name of ["FrequencyLow","FrequencyHigh","FrequencyStep","FixedFrequency","AmplitudeLow","AmplitudeHigh","AmplitudeStep","FixedAmplitude","PhaseLow","PhaseHigh","PhaseStep","FixedPhase"]) {
              p.Channels[index][name] = value(`ch${index}_${name}`);
            }
          }
        }
      }

      p.ScopeChannels = p.ScopeChannels || [];
      const scopeCount = currentScopeCount(p);
      for (let i = 0; i < scopeCount; i++) {
        if (document.getElementById(`scope${i}_TriggerIndex`)) {
          p.ScopeChannels[i] = p.ScopeChannels[i] || {};
          p.ScopeChannels[i].Channels = [0,1,2,3].map(ch => bool(`scope${i}_ch${ch}`));
          p.ScopeChannels[i].TriggerIndex = Number(value(`scope${i}_TriggerIndex`) || 0);
        }
      }

      state.preset = normalizePreset(p);
      return state.preset;
    }

    function wirePage() {
      document.querySelectorAll("input, textarea, select").forEach(control => {
        if (["relayUrl", "labId", "password"].includes(control.id)) return;
        const update = () => {
          state.preset = collect();
          state.dirty = true;
          if (shouldRerenderFor(control)) render();
        };
        control.addEventListener("input", update);
        control.addEventListener("change", update);
      });

      document.querySelectorAll("[data-view]").forEach(button => {
        button.onclick = () => {
          state.preset = collect();
          state.view = button.dataset.view;
          localStorage.setItem(viewKey, state.view);
          render();
        };
      });

      document.querySelectorAll("[data-home]").forEach(button => {
        button.onclick = () => {
          state.preset = collect();
          state.view = "home";
          state.dirty = false;
          localStorage.setItem(viewKey, state.view);
          render();
        };
      });

      document.querySelectorAll("[data-start-equipment]").forEach(button => {
        button.onclick = async () => {
          state.preset = normalizePreset(state.preset || defaultPreset());
          state.preset.Equipment = button.dataset.startEquipment;
          state.dirty = false;
          if (await sendCommand("apply", true, `${equipmentLabel(state.preset.Equipment)} scan opened on desktop app.`, { refresh:false })) {
            state.view = "setup";
            localStorage.setItem(viewKey, state.view);
            render();
            setTimeout(() => refreshStatus({ preserveDraft:false }).catch(() => {}), 3500);
          }
        };
      });

      document.querySelectorAll("[data-equipment]").forEach(button => {
        button.onclick = () => {
          state.preset = collect();
          state.preset.Equipment = button.dataset.equipment;
          state.dirty = true;
          render();
        };
      });

      document.querySelectorAll("[data-fg-prev]").forEach(button => {
        button.onclick = () => {
          state.preset = collect();
          state.selectedFgIndex = Math.max(0, state.selectedFgIndex - 1);
          render();
        };
      });

      document.querySelectorAll("[data-fg-next]").forEach(button => {
        button.onclick = () => {
          state.preset = collect();
          state.selectedFgIndex = Math.min(currentFgCount(state.preset) - 1, state.selectedFgIndex + 1);
          render();
        };
      });

      document.querySelectorAll("[data-command]").forEach(button => {
        button.onclick = async () => {
          const type = button.dataset.command;
          const includePreset = ["apply", "run", "detect-generators", "detect-scope-generators", "detect-oscilloscopes", "detect-all"].includes(type);
          await sendCommand(type, includePreset);
        };
      });

      document.querySelectorAll("[data-next]").forEach(button => {
        button.onclick = async () => {
          if (await sendCommand("apply", true, "Setup applied. Move to scan inputs.")) {
            state.view = "inputs";
            localStorage.setItem(viewKey, state.view);
            render();
          }
        };
      });

      document.querySelectorAll("[data-refresh]").forEach(button => {
        button.onclick = () => {
          state.dirty = false;
          refreshStatus({ preserveDraft:false }).then(() => setNotice("Status refreshed from desktop app.", "ok")).catch(error => setNotice(error.message, "error"));
        };
      });

      document.querySelectorAll("[data-reset]").forEach(button => {
        button.onclick = async () => {
          if (confirm("Reset scan inputs on the desktop app?")) await sendCommand("reset", false);
        };
      });
    }

    function shouldRerenderFor(control) {
      return control.id === "ModeIndex" ||
        control.id === "ScanTypeIndex" ||
        control.id === "StateRatioSweepIndex" ||
        control.id === "StateRatioSameFrequency" ||
        /^(ch\d+_Used|ch\d+_ModeIndex)$/.test(control.id);
    }

    async function sendCommand(type, includePreset = false, friendlyMessage = "", options = {}) {
      try {
        const status = await api("/api/status?labId=" + encodeURIComponent(state.labId));
        state.desktopOnline = status.status?.desktopOnline === true;
        state.appState = state.desktopOnline ? (status.status?.appState || null) : null;
        if (!state.desktopOnline) {
          setPills();
          setNotice("Desktop remote control is off. Enable Remote in the desktop app first.", "error");
          return false;
        }

        const body = { type };
        if (includePreset) body.preset = collect();
        state.dirty = false;
        const result = await api("/api/command", {
          method: "POST",
          body: JSON.stringify(body)
        });
        setNotice(friendlyMessage || result.message || "Command queued.", "ok");
        if (type === "run") {
          startRunMonitor();
        }
        if (options.refresh !== false) {
          setTimeout(() => refreshStatus({ preserveDraft:false }).catch(() => {}), 1100);
          setTimeout(() => refreshStatus({ preserveDraft:false }).catch(() => {}), 4500);
          if (type.startsWith("detect-")) {
            setTimeout(() => refreshStatus({ preserveDraft:false }).catch(() => {}), 10000);
            setTimeout(() => refreshStatus({ preserveDraft:false }).catch(() => {}), 17000);
          }
        }
        return true;
      } catch (error) {
        setNotice(error.message, "error");
        return false;
      }
    }

    function startRunMonitor() {
      if (state.runMonitorId) clearInterval(state.runMonitorId);
      state.runMonitorAttempts = 0;
      state.runMonitorId = setInterval(async () => {
        state.runMonitorAttempts += 1;
        try {
          await refreshStatus({ preserveDraft:false });
          if (completedTransmissionSpectrum() || !state.desktopOnline || state.runMonitorAttempts > 1440) {
            clearInterval(state.runMonitorId);
            state.runMonitorId = 0;
          }
        } catch {
          if (state.runMonitorAttempts > 720) {
            clearInterval(state.runMonitorId);
            state.runMonitorId = 0;
          }
        }
      }, 5000);
    }

    function resumeRemoteSession() {
      if (!state.token || !state.relayUrl || !state.labId) return;
      refreshStatus({ preserveDraft:false }).catch(error => setNotice(error.message, "error"));
    }

    document.getElementById("loginButton").onclick = login;
    document.getElementById("clearLoginButton").onclick = clearSavedLogin;
    window.addEventListener("focus", resumeRemoteSession);
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") resumeRemoteSession();
    });

    loadSavedSettings();
    if (state.token && state.relayUrl && state.labId) {
      state.view = "home";
      refreshStatus({ preserveDraft:false })
        .then(showApp)
        .catch(() => {
          localStorage.removeItem(tokenKey);
          state.token = "";
          document.getElementById("loginMessage").textContent = "Saved login expired. Login again with the current password.";
          setPills();
        });
    } else {
      state.preset = defaultPreset();
      setPills();
    }
  </script>
</body>
</html>
